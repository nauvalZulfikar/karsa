<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidak Ada Koneksi — DPUTR PM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
            color: #374151;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #fef3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 40px;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        p  { font-size: 15px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
        button {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .brand { margin-top: 40px; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>
        Sepertinya kamu sedang offline.<br>
        Pastikan koneksi internet aktif, lalu coba lagi.
    </p>
    <button onclick="window.location.reload()">Coba Lagi</button>
    <p class="brand">DPUTR Project Management</p>
</body>
</html>
